# Loguru-style Logging Configuration

handlers:
  - sink: "sys.stderr"
    level: "INFO"
    format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"

  - sink: "logs/app.log"
    level: "INFO"
    rotation: "500 MB"
    retention: "10 days"
    format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"

  - sink: "logs/error.log"
    level: "ERROR"
    rotation: "100 MB"
    retention: "30 days"
    format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"

  - sink: "logs/trade_history.log"
    level: "INFO"
    rotation: "100 MB"
    retention: "90 days"
    filter_tag: "trade"
    format: "{time:YYYY-MM-DD HH:mm:ss} | {message}"
